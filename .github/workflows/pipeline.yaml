name: Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_release: ${{ steps.semantic.outputs.new_release_version != '' }}
      version: ${{ steps.semantic.outputs.new_release_version || steps.semantic.outputs.last_release_version || '0.0.0' }}
      maven_snapshot_version: ${{ format('{0}-SNAPSHOT', steps.semantic.outputs.new_release_version || steps.semantic.outputs.last_release_version || '0.0.0') }}
      npm_snapshot_version: ${{ format('{0}-snapshot.sha{1}', steps.semantic.outputs.new_release_version || steps.semantic.outputs.last_release_version || '0.0.0', github.sha) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - id: semantic
        name: Semantic Release Dry Run
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 24.2.7
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: opencl
        run: |
          sudo apt-get install -y ocl-icd-libopencl1 pocl-opencl-icd clinfo
          clinfo

      - uses: browser-actions/setup-chrome@v2

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - run: |
          ./gradlew --info --no-daemon ktlintCheck allTests --stacktrace

  npm-snapshot:
    runs-on: ubuntu-latest
    needs:
      - version
      - test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Pack npm snapshots
        run: ./gradlew packJsPackage --stacktrace -Pversion="${{ needs.version.outputs.npm_snapshot_version }}"

      - name: Upload npm snapshots
        uses: actions/upload-artifact@v7
        with:
          name: npm-snapshots-${{ needs.version.outputs.npm_snapshot_version }}
          path: ./*/build/packages/*.tgz

  maven-snapshot:
    runs-on: ubuntu-latest
    needs:
      - version
      - test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Publish Maven Snapshot
        run: |
          echo "Version: ${{ needs.version.outputs.maven_snapshot_version }}"
          ./gradlew publishToSonatype --stacktrace -P version="${{ needs.version.outputs.maven_snapshot_version }}"
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPEUSERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPEPASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGKEY }}

  release:
    runs-on: ubuntu-latest
    environment:
      name: release
    needs:
      - version
      - test
      - npm-snapshot
      - maven-snapshot
    if: ${{ needs.version.outputs.has_release == 'true' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Create GitHub Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 24.2.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Maven Release
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --stacktrace -P version="${{ needs.version.outputs.version }}"
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPEUSERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPEPASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGKEY }}

      - name: Publish npm Packages
        run: ./gradlew publishJsPackageToNpmjsRegistry --stacktrace -Pversion="${{ needs.version.outputs.version }}"
